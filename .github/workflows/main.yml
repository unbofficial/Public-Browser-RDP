name: Public-Persistent-Browser-RDP-V3

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Google Code (4/0A... part)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Chrome Session
        uses: actions/cache@v3
        with:
          path: C:\Users\Public\BrowserData
          key: chrome-session-${{ github.run_id }}
          restore-keys: |
            chrome-session-

      - name: 2. Install CRD
        shell: pwsh
        run: |
          $msiPath = "$env:TEMP\crd.msi"
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /qn /norestart" -Wait
          Start-Sleep -Seconds 20

      - name: 3. Connect (Fixed Path Logic)
        shell: pwsh
        run: |
          # Input handling without complex symbols
          $inputCode = "${{ github.event.inputs.auth_code }}"
          
          # Searching for the file safely
          $dir1 = "C:\Program Files\Google\Chrome Remote Desktop"
          $dir2 = "C:\Program Files (x86)\Google\Chrome Remote Desktop"
          
          $exePath = Get-ChildItem -Path $dir1, $dir2 -Filter "remoting_start_host.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          
          if (!$exePath) { throw "CRD not found!" }
          
          Write-Host "âś… Path Found: $exePath"
          
          # Executing with arguments
          & $exePath --code="$inputCode" --redirect-url="https://remotedesktop.google.com/_/OAuthResult" --name="GitHub-PC" --pin="${{ secrets.CRD_PIN }}"

      - name: 4. Create Desktop Shortcuts
        shell: pwsh
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $dataPath = "C:\Users\Public\BrowserData"
          if (!(Test-Path $dataPath)) { New-Item -Path $dataPath -ItemType Directory -Force }
          "@echo off`nstart chrome --user-data-dir=`"$dataPath`" --no-sandbox --no-first-run" | Out-File "$publicDesktop\OPEN_CHROME.bat" -Encoding ascii
          "@echo off`ntaskkill /F /IM chrome.exe /T`npowershell -Command `"New-Item -Path 'C:\exit.txt' -ItemType File`"" | Out-File "$publicDesktop\SAVE_AND_EXIT.bat" -Encoding ascii

      - name: 5. Keep Alive
        shell: pwsh
        run: |
          Write-Host "âś… Ready! Check: https://remotedesktop.google.com/access"
          $timeout = New-TimeSpan -Hours 6
          $sw = [diagnostics.stopwatch]::StartNew()
          while ($sw.Elapsed -lt $timeout -and !(Test-Path "C:\exit.txt")) { Start-Sleep -Seconds 30 }
