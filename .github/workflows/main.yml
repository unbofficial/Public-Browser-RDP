name: Public-Persistent-Browser-RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Chrome Session
        uses: actions/cache@v3
        with:
          path: C:\Users\Public\BrowserData
          key: chrome-session-${{ github.run_id }}
          restore-keys: |
            chrome-session-

      - name: 2. Install Chrome Remote Desktop (Force Mode)
        shell: pwsh
        run: |
          Write-Host "Downloading CRD..."
          $msiPath = "$env:TEMP\crd.msi"
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
          
          Write-Host "Installing CRD..."
          # Force installation with more flags
          Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /qn /L*V `"$env:TEMP\crd_log.txt`"" -Wait
          
          Write-Host "Waiting for files to appear..."
          Start-Sleep -Seconds 45

      - name: 3. Setup and Connect (Deep Search)
        shell: pwsh
        run: |
          $command = '${{ secrets.CRD_COMMAND }}'
          if ($command -match '--code="([^"]+)"') { $authCode = $matches[1] }
          else { Write-Error "❌ Invalid Secret!"; exit 1 }

          # Pure system mein file dhoondo, kahin toh hogi!
          Write-Host "Searching everywhere for remoting_start_host.exe..."
          $exePath = Get-ChildItem -Path "C:\Program Files" -Filter "remoting_start_host.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          
          if (!$exePath) {
              $exePath = Get-ChildItem -Path "C:\Program Files (x86)" -Filter "remoting_start_host.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }

          if (!$exePath) { 
              Write-Host "Log File Content:"
              Get-Content "$env:TEMP\crd_log.txt" -Tail 20
              Write-Error "❌ CRD files are STILL missing!"; exit 1 
          }

          Write-Host "✅ Success! Path Found: $exePath"
          $params = @("--code=$authCode", "--redirect-url=https://remotedesktop.google.com/_/OAuthResult", "--name=GitHub-PC", "--pin=${{ secrets.CRD_PIN }}")
          Start-Process -FilePath $exePath -ArgumentList $params -Wait

      - name: 4. Create Desktop Shortcuts
        shell: pwsh
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $dataPath = "C:\Users\Public\BrowserData"
          if (!(Test-Path $dataPath)) { New-Item -Path $dataPath -ItemType Directory -Force }
          "@echo off`nstart chrome --user-data-dir=`"$dataPath`" --no-sandbox --no-first-run" | Out-File "$publicDesktop\OPEN_CHROME.bat" -Encoding ascii
          "@echo off`ntaskkill /F /IM chrome.exe /T`npowershell -Command `"New-Item -Path 'C:\exit_signal.txt' -ItemType File`"" | Out-File "$publicDesktop\SAVE_AND_EXIT.bat" -Encoding ascii

      - name: 5. Keep Alive
        shell: pwsh
        run: |
          Write-Host "✅ Check: https://remotedesktop.google.com/access"
          $timeout = New-TimeSpan -Hours 6
          $sw = [diagnostics.stopwatch]::StartNew()
          while ($sw.Elapsed -lt $timeout -and !(Test-Path "C:\exit_signal.txt")) { Start-Sleep -Seconds 30 }
