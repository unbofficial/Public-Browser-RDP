name: Public-Persistent-Browser-RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Session Restore
        uses: actions/cache@v3
        with:
          path: C:\Users\Public\BrowserData
          key: chrome-session-${{ github.run_id }}
          restore-keys: |
            chrome-session-

      - name: 2. Install Chrome Remote Desktop
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "crd.msi"
          Start-Process -FilePath msiexec.exe -ArgumentList "/i crd.msi /quiet /qn /norestart" -Wait

      - name: 3. Setup and Connect
        shell: pwsh
        run: |
          # Yahan hum aapka secret check karenge
          $command = '${{ secrets.CRD_COMMAND }}'
          
          # Code nikalne ka asaan tarika
          if ($command -match '--code="([^"]+)"') {
              $authCode = $matches[1]
              Write-Host "✅ Code Mil Gaya: $authCode"
          } else {
              Write-Error "❌ Masla: CRD_COMMAND secret mein sahi code nahi mila!"
              exit 1
          }

          # Host ko start karna
          $params = @(
              "--code=$authCode",
              "--redirect-url=https://remotedesktop.google.com/_/OAuthResult",
              "--name=GitHub-PC",
              "--pin=${{ secrets.CRD_PIN }}"
          )

          $exePath = "C:\Program Files\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          Start-Process -FilePath $exePath -ArgumentList $params -Wait
          
      - name: 4. Create Desktop Tools
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $dataPath = "C:\Users\Public\BrowserData"
          if (!(Test-Path $dataPath)) { New-Item -Path $dataPath -ItemType Directory -Force }

          "@echo off`nstart chrome --user-data-dir=`"$dataPath`" --no-sandbox --no-first-run" | Out-File "$publicDesktop\OPEN_CHROME.bat" -Encoding ascii
          "@echo off`ntaskkill /F /IM chrome.exe /T`npowershell -Command `"New-Item -Path 'C:\exit.txt' -ItemType File`"" | Out-File "$publicDesktop\SAVE_AND_EXIT.bat" -Encoding ascii

      - name: 5. Keep Alive
        run: |
          Write-Host "Checking connection..."
          $timeout = New-TimeSpan -Hours 6
          $stopwatch = [diagnostics.stopwatch]::StartNew()
          while ($stopwatch.Elapsed -lt $timeout -and !(Test-Path "C:\exit.txt")) {
              Write-Host "RDP is Live. Check: https://remotedesktop.google.com/access"
              Start-Sleep -Seconds 60
          }
