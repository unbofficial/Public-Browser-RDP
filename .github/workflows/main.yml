name: Public-Persistent-Browser-RDP-Final

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Google Code (Sirf wo lamba code paste karein jo 4/0A se shuru hota hai)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Restore Chrome Session
        uses: actions/cache@v3
        with:
          path: C:\Users\Public\BrowserData
          key: chrome-session-${{ github.run_id }}
          restore-keys: |
            chrome-session-

      - name: 2. Install CRD
        shell: pwsh
        run: |
          $msiPath = "$env:TEMP\crd.msi"
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /qn /norestart" -Wait
          Start-Sleep -Seconds 30

      - name: 3. Connect (Hardcoded Path Strategy)
        shell: pwsh
        run: |
          # Is line mein hum bracket wala masla khatam kar rahe hain
          $rawInput = @"
          ${{ github.event.inputs.auth_code }}
          "@
          
          # Sirf wo code nikalna jo 4/ se shuru hota hai (Regex logic)
          if ($rawInput -match '4/[a-zA-Z0-9_-]+') {
              $cleanCode = $matches[0]
              Write-Host "✅ Clean Code Mil Gaya!"
          } else {
              $cleanCode = $rawInput.Trim()
          }

          # Manual Path Search (No variables that can break)
          $exePath = "C:\Program Files (x86)\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (!(Test-Path $exePath)) {
              $exePath = Get-ChildItem -Path "C:\Program Files\Google\Chrome Remote Desktop\" -Filter "remoting_start_host.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }
          
          if (!$exePath) { throw "CRD files not found!" }

          Write-Host "Connecting..."
          & $exePath --code="$cleanCode" --redirect-url="https://remotedesktop.google.com/_/OAuthResult" --name="GitHub-PC" --pin="${{ secrets.CRD_PIN }}"

      - name: 4. Create Desktop Shortcuts
        shell: pwsh
        run: |
          $publicDesktop = "C:\Users\Public\Desktop"
          $dataPath = "C:\Users\Public\BrowserData"
          if (!(Test-Path $dataPath)) { New-Item -Path $dataPath -ItemType Directory -Force }
          "@echo off`nstart chrome --user-data-dir=`"$dataPath`" --no-sandbox --no-first-run" | Out-File "$publicDesktop\OPEN_CHROME.bat" -Encoding ascii
          "@echo off`ntaskkill /F /IM chrome.exe /T`npowershell -Command `"New-Item -Path 'C:\exit.txt' -ItemType File`"" | Out-File "$publicDesktop\SAVE_AND_EXIT.bat" -Encoding ascii

      - name: 5. Keep Alive
        shell: pwsh
        run: |
          Write-Host "✅ Check: https://remotedesktop.google.com/access"
          $timeout = New-TimeSpan -Hours 6
          $sw = [diagnostics.stopwatch]::StartNew()
          while ($sw.Elapsed -lt $timeout -and !(Test-Path "C:\exit.txt")) { Start-Sleep -Seconds 30 }
